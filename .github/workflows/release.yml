name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # ── Build the web dist (used by all targets) ──────────────────────
  build-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build:prod
      - uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: dist/

  # ── Windows .exe (NSIS installer) ─────────────────────────────────
  build-windows:
    needs: build-web
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: dist/
      - run: npx electron-builder --win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: release/*.exe

  # ── Mac .dmg ──────────────────────────────────────────────────────
  build-mac:
    needs: build-web
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: dist/
      - run: npx electron-builder --mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/upload-artifact@v4
        with:
          name: mac-installer
          path: release/*.dmg

  # ── COM Add-ins (.dotm, .xlam, .ppam) ────────────────────────────
  build-com-addins:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Enable VBA project access in registry
        shell: powershell
        run: |
          # Word 16.0
          $wordKey = "HKCU:\Software\Microsoft\Office\16.0\Word\Security"
          if (-not (Test-Path $wordKey)) { New-Item -Path $wordKey -Force | Out-Null }
          Set-ItemProperty -Path $wordKey -Name "AccessVBOM" -Value 1 -Type DWord
          # Excel 16.0
          $excelKey = "HKCU:\Software\Microsoft\Office\16.0\Excel\Security"
          if (-not (Test-Path $excelKey)) { New-Item -Path $excelKey -Force | Out-Null }
          Set-ItemProperty -Path $excelKey -Name "AccessVBOM" -Value 1 -Type DWord
          # PowerPoint 16.0
          $pptKey = "HKCU:\Software\Microsoft\Office\16.0\PowerPoint\Security"
          if (-not (Test-Path $pptKey)) { New-Item -Path $pptKey -Force | Out-Null }
          Set-ItemProperty -Path $pptKey -Name "AccessVBOM" -Value 1 -Type DWord

      - name: Build COM add-ins
        shell: powershell
        run: |
          cd com-addin
          .\build-all.ps1
        continue-on-error: true

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: com-addins
          path: com-addin/build/*
          if-no-files-found: warn

  # ── Create GitHub Release with all artifacts ──────────────────────
  release:
    needs: [build-web, build-windows, build-mac, build-com-addins]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: web-dist/

      - uses: actions/download-artifact@v4
        with:
          name: windows-installer
          path: windows/

      - uses: actions/download-artifact@v4
        with:
          name: mac-installer
          path: mac/

      - uses: actions/download-artifact@v4
        with:
          name: com-addins
          path: com-addins/
        continue-on-error: true

      # Zip the web dist for download
      - name: Package web release
        run: |
          cd web-dist
          zip -r ../SuperQAT-web.zip .
          cd ..

      # Zip the manifests for easy sideloading
      - name: Package manifests
        run: zip -r SuperQAT-manifests.zip manifests/

      # Zip the COM add-ins
      - name: Package COM add-ins
        run: |
          if [ -d "com-addins" ] && [ "$(ls -A com-addins 2>/dev/null)" ]; then
            zip -r SuperQAT-COM-addins.zip com-addins/
          fi

      # Zip the VBA source (always available, even if COM build fails)
      - name: Package VBA source
        run: zip -r SuperQAT-VBA-source.zip com-addin/ -x "com-addin/build/*"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            windows/*.exe
            mac/*.dmg
            SuperQAT-web.zip
            SuperQAT-manifests.zip
            SuperQAT-COM-addins.zip
            SuperQAT-VBA-source.zip
