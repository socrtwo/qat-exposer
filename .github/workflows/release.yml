name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # ── Build the web dist (used by all targets) ──────────────────────
  build-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build:prod
      - uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: dist/

  # ── Windows .exe (NSIS installer) ─────────────────────────────────
  build-windows:
    needs: build-web
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: dist/
      - run: npx electron-builder --win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: release/*.exe

  # ── Mac .dmg ──────────────────────────────────────────────────────
  build-mac:
    needs: build-web
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: dist/
      - run: npx electron-builder --mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/upload-artifact@v4
        with:
          name: mac-installer
          path: release/*.dmg

  # ── Create GitHub Release with all artifacts ──────────────────────
  release:
    needs: [build-web, build-windows, build-mac]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: web-dist/

      - uses: actions/download-artifact@v4
        with:
          name: windows-installer
          path: windows/

      - uses: actions/download-artifact@v4
        with:
          name: mac-installer
          path: mac/

      # Zip the web dist for download
      - name: Package web release
        run: |
          cd web-dist
          zip -r ../SuperQAT-web.zip .
          cd ..

      # Zip the manifests for easy sideloading
      - name: Package manifests
        run: zip -r SuperQAT-manifests.zip manifests/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            windows/*.exe
            mac/*.dmg
            SuperQAT-web.zip
            SuperQAT-manifests.zip
