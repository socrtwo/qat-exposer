name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to create/publish (e.g. v3.0.3). Created server-side at the dispatched ref.'
        required: true

permissions:
  contents: write
  id-token: write

jobs:
  build-windows:
    runs-on: windows-latest
    environment: release
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npm run build
      - run: npx electron-builder --win --publish never
      - name: Azure login (OIDC, no stored secret)
        if: vars.AZURE_TENANT_ID != ''
        uses: azure/login@v2
        with:
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Sign Windows binaries with Azure Trusted Signing
        if: vars.AZURE_TENANT_ID != ''
        uses: azure/trusted-signing-action@v0.5.1
        with:
          endpoint: ${{ vars.TS_ENDPOINT }}
          trusted-signing-account-name: ${{ vars.TS_ACCOUNT_NAME }}
          certificate-profile-name: ${{ vars.TS_CERT_PROFILE }}
          files-folder: release
          files-folder-filter: exe
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256
      - uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: release/*.exe

  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npm run build
      - run: npx electron-builder --mac --publish never
      - uses: actions/upload-artifact@v4
        with:
          name: mac-installer
          path: |
            release/*.dmg
            release/*.zip

  build-web-addin:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npm run build
      - name: Create web add-in zip
        run: cd dist && zip -r ../SuperQAT-Web-Addin.zip .
      - uses: actions/upload-artifact@v4
        with:
          name: web-addin
          path: SuperQAT-Web-Addin.zip

  publish-release:
    needs: [build-windows, build-mac, build-web-addin]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f

      - name: Upload to release
        if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && inputs.tag != '')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          files: |
            artifacts/**/*
            word-vba-addin/SuperQAT.dot
