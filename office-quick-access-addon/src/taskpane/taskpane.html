<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quick Access Toolbar</title>
    <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
    <link rel="stylesheet" href="taskpane.css">
</head>
<body>
    <div id="app">
        <header>
            <h1>Quick Access</h1>
        </header>

        <select id="command-list">
            <option value="" disabled selected>Choose a command...</option>
            <option value="save">Save</option>
            <option value="print">Print</option>
            <option value="undo">Undo</option>
            <option value="redo">Redo</option>
            <option value="selectAll">Select All</option>
            <option value="bold">Bold</option>
            <option value="italic">Italic</option>
            <option value="underline">Underline</option>
            <option value="strikethrough">Strikethrough</option>
            <option value="superscript">Superscript</option>
            <option value="subscript">Subscript</option>
            <option value="fontSize8">Font Size 8</option>
            <option value="fontSize10">Font Size 10</option>
            <option value="fontSize11">Font Size 11</option>
            <option value="fontSize12">Font Size 12</option>
            <option value="fontSize14">Font Size 14</option>
            <option value="fontSize16">Font Size 16</option>
            <option value="fontSize18">Font Size 18</option>
            <option value="fontSize20">Font Size 20</option>
            <option value="fontSize24">Font Size 24</option>
            <option value="fontSize28">Font Size 28</option>
            <option value="fontSize36">Font Size 36</option>
            <option value="fontSize48">Font Size 48</option>
            <option value="fontSize72">Font Size 72</option>
            <option value="colorBlack">Color: Black</option>
            <option value="colorRed">Color: Red</option>
            <option value="colorBlue">Color: Blue</option>
            <option value="colorGreen">Color: Green</option>
            <option value="colorOrange">Color: Orange</option>
            <option value="colorPurple">Color: Purple</option>
            <option value="highlightYellow">Highlight Yellow</option>
            <option value="highlightNone">Remove Highlight</option>
            <option value="alignLeft">Align Left</option>
            <option value="alignCenter">Center</option>
            <option value="alignRight">Align Right</option>
            <option value="alignJustify">Justify</option>
            <option value="insertTable">Insert Table</option>
            <option value="insertPageBreak">Page Break</option>
            <option value="insertHorizontalLine">Horizontal Line</option>
        </select>

        <button id="run-btn">Run</button>
    </div>

    <script src="taskpane.js"></script>
</body>
</html>
