appId: com.superqat.addin
productName: SuperQAT
directories:
  output: release
files:
  - dist/**/*
  - electron/**/*
  - package.json
extraResources:
  - manifests/**/*
mac:
  category: public.app-category.productivity
  target:
    - dmg
  icon: src/assets/icon-128.png
dmg:
  title: SuperQAT
win:
  target:
    - nsis
  icon: src/assets/icon-128.png
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  installerIcon: src/assets/icon-128.png
  uninstallerIcon: src/assets/icon-128.png
  menuCategory: SuperQAT
  shortcutName: SuperQAT
